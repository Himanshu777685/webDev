<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bounceball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: blue;
        }

        .box {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 25px;
            display: flex;
            position: absolute;
            bottom: 0;
            right: 0;
            animation: move 2s infinite cubic-bezier(0, 0.97, 0.73, 1) forwards;
        }

        @keyframes move {
            0% {
                transform: translate(-10px, -200px) scale(1);
            }

            10% {
                transform: translate(-40px, -120px) scale(1);
            }

            20% {
                transform: translate(-80px, -50px) scale(1.1);
            }

            30% {
                transform: translate(-120px, -100px) scale(1);
            }

            40% {
                transform: translate(-160px, -130px) scale(1);
            }

            50% {
                transform: translate(-200px, -105px) scale(1);
            }

            60% {
                transform: translate(-240px, -50px) scale(1.1);
            }

            70% {
                transform: translate(-280px, -80px) scale(1);
            }

            80% {
                transform: translate(-320px, -90px) scale(1);
            }

            90% {
                transform: translate(-360px, -65px) scale(1);
            }

            100% {
                transform: translate(-400px, -50px) scale(1.1);
            }
        }

        .floor{
            background-color: black;
            width:100vw;
            height: 50px;
            display: flex;
            position: absolute;
            bottom: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">

        </div>
        <div class="floor">

        </div>
    </div>
</body>

</html>
