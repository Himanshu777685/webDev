<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0px;
            margin: 0px;
           
        }

        .box {
            position:relative;
            border: 2px solid black;
            border-radius: 25px;
            width: 400px;
            background-color: rgb(255, 252, 226);
            margin: 90px;
        }

        img {
            padding: 10px;
            border-radius: 25px;
            max-width: 380px;
            height: auto;
        }

        .box1 {
            position: relative;
        }

        .button {
            display: flex;
            padding: 10px;
            margin-left: 10px;

        }

        .button1, .button2 {
            
            background-color: white;
            border: 2px solid rgb(65, 64, 64);
            border-radius: 25px;
            padding: 5px;
            margin: 5px;
            }
        .heading{
            margin-left: 3vw;
            padding:3px;

        }
        .content{
            padding:15px;

        }
        .button3{
            background-color: rgb(247, 241, 181);
            border: none;
            border-radius: 25px;
            padding:5px;
            margin-bottom:10px;
            margin-left:133px ;
            cursor: pointer;
           
        }
        .button3:hover{
            background-color: rgb(235, 226, 105);
            
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="box1">
            <img src="https://as2.ftcdn.net/v2/jpg/04/08/25/05/1000_F_408250543_MVaEVGeWxb4FiFy7mEGKj8nfYkwoAZON.jpg" alt="Nature image">
            <div class="button">
                <button class="button1">Nature</button>
                <button class="button2">Lake</button>
            </div>
            <div class="heading">
                <h2>River Ganga</h2>
            </div>
            <div class="content">
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Nobis perferendis doloremque possimus, accusamus modi rem necessitatibus sunt, iusto ullam atque magni dolor placeat, vel earum consectetur praesentium voluptatum suscipit culpa?
            </div>
            <div class="more">
                <button class="button3">Read More</button>
            </div>



        </div>

    </div>

</body>

</html>
